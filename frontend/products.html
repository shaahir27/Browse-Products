<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Browser Store</title>
  <meta name="description" content="Browse all products from our catalog. Filter by category and load more with seamless pagination." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="products-page">

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand" id="nav-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">Browser<span class="brand-accent">Store</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link" id="nav-home">Home</a>
        <a href="/products.html" class="nav-link active" id="nav-products">Products</a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="page-header" id="page-header">
    <div class="page-header-inner">
      <h1 class="page-title" id="page-title">All Products</h1>
      <p class="page-subtitle" id="page-subtitle">Browse our full catalog in real-time</p>
    </div>
  </header>

  <!-- Controls Bar -->
  <div class="controls-bar" id="controls-bar">
    <div class="controls-inner">

      <!-- Category filter -->
      <div class="filter-group" id="filter-group">
        <label for="category-input" class="filter-label">Filter by Category</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
          <input
            type="text"
            id="category-input"
            class="filter-input"
            placeholder="e.g. Electronics, Clothing…"
            autocomplete="off"
          />
          <button class="clear-input" id="clear-category" title="Clear filter" aria-label="Clear category filter" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Limit selector -->
      <div class="filter-group" id="limit-group">
        <label for="limit-select" class="filter-label">Per Page</label>
        <select id="limit-select" class="limit-select">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
        </select>
      </div>

      <!-- Apply button -->
      <button class="btn btn-primary btn-sm" id="apply-filter-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Apply
      </button>
    </div>

    <!-- Active filters pills -->
    <div class="active-filters" id="active-filters"></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    <span id="result-count" class="result-count"></span>
    <span id="snapshot-info" class="snapshot-info"></span>
  </div>

  <!-- Main content -->
  <main class="products-main" id="products-main">

    <!-- Skeleton loader -->
    <div class="products-grid" id="skeleton-grid" aria-hidden="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Products grid -->
    <div class="products-grid" id="products-grid" style="display:none"></div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <h2 class="empty-title">No products found</h2>
      <p class="empty-text">Try adjusting your filters or clearing the category.</p>
      <button class="btn btn-ghost" id="clear-filter-btn">Clear Filters</button>
    </div>

    <!-- Error state -->
    <div class="error-state" id="error-state" style="display:none">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">Something went wrong</h2>
      <p class="error-text" id="error-message">Could not fetch products. Please try again.</p>
      <button class="btn btn-primary btn-sm" id="retry-btn">Retry</button>
    </div>

    <!-- Load more -->
    <div class="load-more-wrapper" id="load-more-wrapper" style="display:none">
      <button class="btn btn-load-more" id="load-more-btn">
        <span id="load-more-text">Load More</span>
        <svg id="load-more-spinner" class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      </button>
    </div>

  </main>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top" style="opacity:0;pointer-events:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <script src="js/products.js"></script>
</body>
</html>
